[pytest]
# Run from the workspace root: python -m pytest ml-project/tests/ -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: marks tests as slow (requires model loading, network access)
    integration: marks integration tests (requires Ollama running)
    unit: marks fast unit tests with no external dependencies
