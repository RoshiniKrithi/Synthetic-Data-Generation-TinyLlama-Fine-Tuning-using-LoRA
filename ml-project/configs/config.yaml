project:
  name: "Synthetic Data Generation + TinyLlama Fine-Tuning with LoRA"
  version: "1.0.0"
  description: "End-to-end GenAI pipeline for internship portfolio"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_synthetic: "data/synthetic"
  models_base: "models/base"
  models_adapter: "models/adapter"
  models_merged: "models/merged"
  reports: "reports"
  charts: "reports/charts"
  logs: "logs"

scraper:
  wikipedia_url: "https://en.wikipedia.org/wiki/Transformer_(deep_learning_architecture)"
  chunk_size: 500
  chunk_overlap: 50
  max_chunks: 30
  retry_attempts: 3
  retry_delay: 2

generator:
  ollama_model: "qwen2.5:1.5b"
  ollama_base_url: "http://127.0.0.1:11434"
  qa_pairs_per_chunk: 5
  max_qa_pairs: 300
  temperature: 0.7
  question_types:
    - "factual"
    - "reasoning"
    - "conceptual"
    - "definition"
  retry_attempts: 3

model:
  base_model: "gpt2"
  max_length: 256
  device: "auto"

lora:
  r: 4
  alpha: 8
  dropout: 0.05
  target_modules:
    - "c_attn"
    - "c_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  epochs: 2
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_steps: 50
  save_steps: 50
  eval_steps: 50
  logging_steps: 5
  max_grad_norm: 1.0
  weight_decay: 0.001
  fp16: false
  bf16: false
  dataloader_num_workers: 0
  seed: 42

evaluation:
  metrics:
    - "exact_match"
    - "bleu"
    - "rouge_l"
    - "bertscore"
  test_split: 0.2
  max_samples: 50
  bertscore_model: "distilbert-base-uncased"

inference:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  repetition_penalty: 1.1

gradio:
  host: "0.0.0.0"
  port: 8000
  share: false
  title: "TinyLlama Fine-Tuning Demo"
  description: "Base vs Fine-Tuned model comparison"
  # Lightweight model used for the interactive UI demo (fits in free-tier RAM).
  # The training pipeline still uses model.base_model (TinyLlama).
  demo_model: "sshleifer/tiny-gpt2"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: "logs/project.log"

# ── Multi-Agent Synthetic Data System ──────────────────────────────────────
# Activated via: python run_all.py --phases 2 --use-agents
agents:
  # Ollama model used by all 3 agents (can differ per agent via overrides below)
  model: "qwen2.5:1.5b"

  # Q&A pairs to generate per chunk/type before scoring
  pairs_per_chunk: 3

  # Maximum total accepted pairs (budget shared across all chunks)
  max_qa_pairs: 200

  # Pairs scoring >= quality_threshold (out of 10) are accepted
  quality_threshold: 7.0

  # Max Refiner attempts per pair before discarding
  max_refine_iterations: 3

  # Per-agent temperatures (Critic should be deterministic)
  temperature: 0.7           # Generator
  critic_temperature: 0.1    # Critic — more deterministic scoring
  refiner_temperature: 0.5   # Refiner — creative but constrained

  # Retry attempts for Ollama API calls
  retry_attempts: 3
